name: Build Addon

on:
  release:
    types: [published]

jobs:
  build-addon:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Prepare release variables
        env:
          RELEASE_TITLE: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          TAG_NAME="${RELEASE_TAG:-$GITHUB_REF_NAME}"

          if [ -z "$TAG_NAME" ]; then
            echo "::error::Release tag could not be resolved."
            exit 1
          fi

          REL_TITLE="${RELEASE_TITLE:-$TAG_NAME}"
          FILE_NAME="$(printf '%s' "$REL_TITLE" | tr ' ' '_' | tr -cd '[:alnum:]_.-')"

          if [ -z "$FILE_NAME" ]; then
            FILE_NAME="$(printf '%s' "$TAG_NAME" | tr ' ' '_' | tr -cd '[:alnum:]_.-')"
          fi

          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "REL_TITLE=$REL_TITLE" >> "$GITHUB_ENV"
          echo "FILE_NAME=$FILE_NAME" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Install Regolith
        run: |
          curl -L https://github.com/Bedrock-OSS/regolith/releases/download/1.8.0/regolith_1.8.0_linux_amd64.tar.gz -o regolith.tar.gz
          tar -xzf regolith.tar.gz
          sudo mv regolith /usr/local/bin/regolith
          regolith --version

      - name: Build dev addon
        run: |
          rm -rf build artifacts
          regolith run buildDev
          mkdir -p artifacts
          cd build
          zip -r "../artifacts/${FILE_NAME}_dev.mcaddon" "UtilityCraft BP" "UtilityCraft RP"

      - name: Build minified addon
        run: |
          rm -rf build
          regolith run buildMinify
          cd build
          zip -r "../artifacts/${FILE_NAME}.mcaddon" "UtilityCraft BP" "UtilityCraft RP"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG_NAME" \
            "artifacts/${FILE_NAME}_dev.mcaddon" \
            "artifacts/${FILE_NAME}.mcaddon" \
            --clobber
